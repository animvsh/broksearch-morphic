<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffffff" />
    <title>Brok is offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        background: #f7f7f4;
        color: #18181b;
      }

      body {
        min-height: 100dvh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        max-width: 420px;
        border: 1px solid rgba(212, 212, 216, 0.9);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.88);
        padding: 24px;
        box-shadow: 0 24px 70px -54px rgba(15, 23, 42, 0.48);
        backdrop-filter: blur(18px);
      }

      h1 {
        margin: 0;
        font-size: 24px;
        line-height: 1.15;
        letter-spacing: 0;
      }

      p {
        margin: 10px 0 0;
        color: #71717a;
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        margin-top: 18px;
        border-radius: 999px;
        background: #09090b;
        color: white;
        padding: 10px 14px;
        text-decoration: none;
        font-weight: 650;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Brok is offline.</h1>
      <p>
        The app shell is installed, but live search, mail, code, and connector
        actions need a network connection.
      </p>
      <a href="/">Try again</a>
    </main>
  </body>
</html>
