[build]
builder = "nixpacks"
buildCommand = "bun run build"

[deploy]
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[ deployments ]
、健康檢查 = "/"

[ env ]
PORT = "8080"
NODE_ENV = "production"

# Supabase
NEXT_PUBLIC_SUPABASE_URL = "${NEXT_PUBLIC_SUPABASE_URL}"
NEXT_PUBLIC_SUPABASE_ANON_KEY = "${NEXT_PUBLIC_SUPABASE_ANON_KEY}"
SUPABASE_SERVICE_ROLE_KEY = "${SUPABASE_SERVICE_ROLE_KEY}"
DATABASE_URL = "${DATABASE_URL}"
DATABASE_SSL_DISABLED = "false"

# AI
OPENAI_COMPATIBLE_API_KEY = "${OPENAI_COMPATIBLE_API_KEY}"
OPENAI_COMPATIBLE_API_BASE_URL = "${OPENAI_COMPATIBLE_API_BASE_URL}"

# Search
TAVILY_API_KEY = "${TAVILY_API_KEY}"

# Auth
ENABLE_AUTH = "true"

# Storage - Use local filesystem on Railway
LOCAL_STORAGE_PATH = "/var/data/uploads"
LOCAL_PUBLIC_URL = "${RAILWAY_PUBLIC_DOMAIN}/api/uploads"
